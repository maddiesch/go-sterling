name: CI
on:
  push:
    branches: ["main"]
  pull_request: {}
  workflow_call: {}
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.26"]
        os: ["ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go test -v -race ./... -timeout 2m
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.26"]
        os: ["ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - run: go mod download
      - run: go build ./...
  coverage:
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -coverprofile=coverage.txt ./... -timeout 2m
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: maddiesch/go-sterling
  code-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Formatting
        run: |-
          PATH="$PATH:$(go env GOROOT)/bin"

          if ! command -v gofmt >/dev/null; then
            echo "gofmt not found"
            exit 1
          fi

          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Files are not properly formatted"
            gofmt -s -l .
            exit 1
          fi
  nil-checking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go install go.uber.org/nilaway/cmd/nilaway@latest
      - run: nilaway ./...
